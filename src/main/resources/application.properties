# ─────────────────────────────────────────────────────────────────────────────
# AI Agent - Application Configuration
#
# Sensitive values are read from environment variables.
# Copy .env.example to .env, fill in your values, and export them before
# running the app:
#   Windows : set LLM_BASE_URL=http://your-host:port  (or use the .env file
#             with a tool like direnv)
#   Linux/Mac: export LLM_BASE_URL=http://your-host:port
#
# For internal Artifactory builds, ensure ~/.m2/settings.xml is configured
# using the template at settings.xml in the project root.
# ─────────────────────────────────────────────────────────────────────────────

# ── LLM Configuration (resolved from environment variables) ──────────────────
#
# LLM_BASE_URL  : Base URL of the internally hosted OpenAI-compatible LLM
#                 e.g.  http://llm.bank.local:8080
#                 Leave unset to use OpenAI cloud (https://api.openai.com)
#
# LLM_API_KEY   : API key for the LLM endpoint.
#                 Set to "none" if the internal server requires no authentication.
#
# LLM_MODEL     : Model name as registered on the LLM server
#                 e.g. llama3, mistral-7b, gpt-4o
#
spring.ai.openai.base-url=${LLM_BASE_URL:https://api.openai.com}
spring.ai.openai.api-key=${LLM_API_KEY:none}
spring.ai.openai.chat.options.model=${LLM_MODEL:gpt-4o}
spring.ai.openai.chat.options.temperature=0.2

# ── H2 In-Memory Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:agentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Always run schema.sql + data.sql on startup
spring.sql.init.mode=always

# H2 web console — available at http://localhost:8080/h2-console during demo
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.bank.agent=DEBUG
logging.level.org.springframework.ai=INFO

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
