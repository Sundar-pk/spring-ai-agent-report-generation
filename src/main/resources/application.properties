# ─────────────────────────────────────────────────────────────────────────────
# AI Agent - Application Configuration
#
# All sensitive / environment-specific values are read from environment variables.
# Copy .env.example -> .env, fill in your values, and load them before starting.
# ─────────────────────────────────────────────────────────────────────────────

# ── LLM Connection (from environment variables) ───────────────────────────────
#
# LLM_BASE_URL   : Base URL of the internally hosted OpenAI-compatible LLM.
#                  Spring AI appends /v1/chat/completions automatically.
#                  Example: if full path is http://host:port/api/v1/chat/completions
#                           set LLM_BASE_URL=http://host:port/api
#
# LLM_API_KEY    : API key sent as "Authorization: Bearer <key>".
#                  Set to "none" if the internal server requires no authentication.
#
# LLM_MODEL      : Model name as registered on the LLM server.
#
# LLM_PROXY_URL  : (Optional) Corporate proxy with credentials.
#                  Format: http://username:password@proxyhost:port
#                  Mirrors JS: { proxy: "http://user:pwd@host" }
#                  Leave unset or empty if no proxy is needed.
#
spring.ai.openai.base-url=${LLM_BASE_URL:https://api.openai.com}
spring.ai.openai.api-key=${LLM_API_KEY:none}
spring.ai.openai.chat.options.model=${LLM_MODEL:gpt-4o}

# ── LLM Chat Options (mirrors the working JS body parameters) ─────────────────
#
# Matches: { frequency_penalty:0, n:1, seed:0, stream:false, max_tokens:131071 }
#
spring.ai.openai.chat.options.temperature=0.2
spring.ai.openai.chat.options.frequency-penalty=0
spring.ai.openai.chat.options.n=1
spring.ai.openai.chat.options.seed=0
spring.ai.openai.chat.options.max-tokens=131071

# ── H2 In-Memory Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:agentdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.sql.init.mode=always

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# ── Logging ───────────────────────────────────────────────────────────────────
# com.bank.agent.config logs the full LLM request URL + body before every call
logging.level.com.bank.agent=DEBUG
logging.level.org.springframework.ai=INFO

# ── Actuator ──────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ── Server ────────────────────────────────────────────────────────────────────
server.port=8080
